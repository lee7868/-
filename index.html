<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>업무용 묶음 카메라 (폴더형)</title>
    
    <link rel="icon" href="https://lee7868.github.io/-/icon.png">
    <link rel="apple-touch-icon" href="https://lee7868.github.io/-/icon.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
            overscroll-behavior-y: none; 
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            margin-top: 10px;
        }
        h1 { margin: 0 0 15px 0; color: #333; font-size: 1.4rem; }
        
        /* 폴더 컨트롤 디자인 */
        .folder-control {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        #folderSelect {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #007bff;
            font-size: 1rem;
            font-weight: bold;
            color: #007bff;
            background: #f8f9fa;
        }
        .btn-small {
            padding: 12px 15px;
            border-radius: 8px;
            background: #6c757d;
            color: white;
            border: none;
            font-weight: bold;
            white-space: nowrap;
        }

        /* 버튼 스타일 */
        .btn {
            display: block;
            width: 100%;
            padding: 18px 0;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn:active { transform: scale(0.98); }
        .btn-add { background-color: #007bff; color: white; }
        .btn-send { background-color: #28a745; color: white; display: none; }
        
        #cameraInput { display: none; }
        
        .info {
            font-size: 0.9rem;
            color: #666;
            margin: 10px 0;
            white-space: pre-line;
        }

        /* 찍은 사진 목록 */
        #photoList {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-top: 15px;
        }
        #photoList img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        .count-badge { font-size: 1.1rem; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🗂️ 다중 고객사 카메라</h1>
        
        <div class="folder-control">
            <select id="folderSelect" onchange="changeFolder()"></select>
            <button class="btn-small" onclick="createFolder()">+ 새 폴더</button>
        </div>

        <p class="info"><span id="currentFolderName">기본 폴더</span>: <span id="countDisplay" class="count-badge">0</span>장 (최대 10장)</p>

        <button id="addBtn" class="btn btn-add" onclick="triggerCamera()">
            📷 현재 폴더에 사진 촬영
        </button>

        <button id="shareBtn" class="btn btn-send" onclick="shareCurrentFolder()">
            🚀 현재 폴더 슬랙으로 보내기
        </button>

        <input type="file" id="cameraInput" accept="image/*" capture="environment">

        <div id="photoList"></div>
    </div>

    <script>
        const cameraInput = document.getElementById('cameraInput');
        const photoList = document.getElementById('photoList');
        const shareBtn = document.getElementById('shareBtn');
        const countDisplay = document.getElementById('countDisplay');
        const addBtn = document.getElementById('addBtn');
        const folderSelect = document.getElementById('folderSelect');
        const currentFolderName = document.getElementById('currentFolderName');

        const MAX_WIDTH = 1280; 
        const MAX_HEIGHT = 1280;
        const COMPRESSION_QUALITY = 0.7;

        // 고객사별로 사진을 담을 "큰 보따리"
        let folders = {
            "기본 고객사": []
        };
        let currentFolder = "기본 고객사";

        // 화면 켤 때 폴더 목록 세팅
        function initFolders() {
            updateFolderSelect();
            renderPhotos();
        }

        // 새 폴더 만들기
        function createFolder() {
            const name = prompt("새로운 고객사 이름을 입력하세요\n(예: 사과고객사)");
            if (name && name.trim() !== "") {
                if (!folders[name]) {
                    folders[name] = []; // 빈 보따리 생성
                }
                currentFolder = name;
                updateFolderSelect();
                renderPhotos();
            }
        }

        // 폴더 변경하기
        function changeFolder() {
            currentFolder = folderSelect.value;
            renderPhotos();
        }

        // 상단 드롭다운(Select) 메뉴 업데이트
        function updateFolderSelect() {
            folderSelect.innerHTML = '';
            for (let folder in folders) {
                const opt = document.createElement('option');
                opt.value = folder;
                opt.innerText = `${folder} (${folders[folder].length}장)`;
                folderSelect.appendChild(opt);
            }
            folderSelect.value = currentFolder;
            currentFolderName.innerText = currentFolder;
        }

        // 현재 폴더의 사진들을 화면에 그려주기
        function renderPhotos() {
            photoList.innerHTML = '';
            const currentPhotos = folders[currentFolder];
            
            currentPhotos.forEach(item => {
                const img = document.createElement('img');
                img.src = item.url;
                photoList.appendChild(img);
            });

            countDisplay.innerText = currentPhotos.length;
            
            if (currentPhotos.length > 0) {
                shareBtn.style.display = 'block';
                shareBtn.innerText = `🚀 [${currentFolder}] ${currentPhotos.length}장 보내기`;
            } else {
                shareBtn.style.display = 'none';
            }
            
            // 다른 폴더로 이동 시 폴더 이름에도 장수 반영
            Array.from(folderSelect.options).forEach(opt => {
                opt.innerText = `${opt.value} (${folders[opt.value].length}장)`;
            });
        }

        // 카메라 켜기
        function triggerCamera() {
            if (folders[currentFolder].length >= 10) {
                alert("한 폴더당 최대 10장까지만 가능합니다!");
                return;
            }
            cameraInput.click();
        }

        // 파일 변환 함수
        function dataURLtoFile(dataurl, filename) {
            var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
                bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
            while(n--){
                u8arr[n] = bstr.charCodeAt(n);
            }
            return new File([u8arr], filename, {type:mime});
        }

        // 사진 찍었을 때 처리
        cameraInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            addBtn.innerText = "⏳ 처리 중...";
            addBtn.disabled = true;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL('image/jpeg', COMPRESSION_QUALITY);
                    
                    const date = new Date();
                    // 파일 이름에 고객사 이름 포함 (예: 사과고객사_1430_1.jpg)
                    const fileName = `${currentFolder}_${date.getHours()}${date.getMinutes()}_${folders[currentFolder].length + 1}.jpg`;
                    const compressedFile = dataURLtoFile(dataUrl, fileName);

                    // 현재 선택된 폴더에 사진 쏙 넣기
                    folders[currentFolder].push({ file: compressedFile, url: dataUrl });

                    // 화면 다시 그리기
                    renderPhotos();
                    
                    addBtn.innerText = "📷 현재 폴더에 사진 촬영";
                    addBtn.disabled = false;
                    cameraInput.value = '';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 전송하기
        async function shareCurrentFolder() {
            const currentPhotos = folders[currentFolder];
            if (currentPhotos.length === 0) return;

            const filesToShare = currentPhotos.map(item => item.file);

            if (navigator.share) {
                try {
                    await navigator.share({
                        files: filesToShare,
                        title: `${currentFolder} 업무 사진`,
                        text: `${currentFolder} - 총 ${filesToShare.length}장`
                    });
                    
                    // 전송 성공 시
                    if (confirm(`전송이 완료되었습니다.\n${currentFolder} 폴더의 사진을 비울까요?`)) {
                        folders[currentFolder] = []; // 폴더 비우기
                        renderPhotos();
                    }
                } catch (error) {
                    console.log('공유 실패', error);
                }
            } else {
                alert("이 브라우저는 여러 장 공유 기능을 지원하지 않습니다.");
            }
        }

        // 시작할 때 폴더 세팅
        initFolders();
    </script>
</body>
</html>
